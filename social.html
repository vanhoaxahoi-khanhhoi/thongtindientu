<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fanpage và Zalo OA phường Khánh Hội</title>
  <style>
    :root {
      --blue: #075da8;
      --line: #bdeeff;
      --ink: #092f5f;
      --muted: #5b6d83;
      --shadow: 0 14px 36px rgba(7, 93, 168, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(213, 248, 255, .8), rgba(255, 255, 255, .96) 38%, rgba(231, 248, 255, .9)),
        #f7fcff;
      line-height: 1.55;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(980px, calc(100% - 28px)); margin: 0 auto; }
    header {
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.2;
    }
    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--blue);
      font-weight: 900;
    }
    main { padding: 26px 0 48px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .card {
      min-height: 220px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
    }
    .card h2 { margin: 0 0 10px; font-size: 22px; }
    .card p { margin: 0 0 16px; color: var(--muted); }
    .button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-weight: 900;
    }
    .qr {
      width: min(100%, 360px);
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      border: 1px solid var(--line);
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="theme.css">
  <script src="protect.js" defer></script>
</head>
<body>
  <header>
    <div class="wrap top">
      <h1>Fanpage và Zalo OA phường Khánh Hội</h1>
      <a class="back" href="index.html">Quay lại trang chính</a>
    </div>
  </header>
  <main class="wrap">
    <div class="grid">
      <section class="card">
        <h2>Fanpage Phường Khánh Hội</h2>
        <p>Kênh Facebook chính thức để theo dõi thông tin và hoạt động của phường Khánh Hội.</p>
        <a class="button" href="https://www.facebook.com/profile.php?id=61577994116083" target="_blank" rel="noreferrer">Mở Fanpage</a>
      </section>
      <section class="card">
        <h2>Zalo OA</h2>
        <p>Mở Zalo và quét mã QR để quan tâm tài khoản OA của Ủy ban Nhân dân Phường Khánh Hội.</p>
        <img class="qr" src="zalo-oa-khanh-hoi.png" alt="Mã QR Zalo OA Ủy ban Nhân dân Phường Khánh Hội">
      </section>
    </div>
  </main>
</body>
</html>
